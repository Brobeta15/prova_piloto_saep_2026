<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Cadastro de Usuário</title>

    <!-- Adicione os links para os arquivos CSS do Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>

<!-- Begin Page Content -->
<div class="container mt-3">

    <!-- DataTales Example -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Cadastro de Usuários</h6>
        </div>
        <div class="card-body">
            <!-- Formulário de Login com Thymeleaf -->
            <form th:action="@{/cadastrarusuario}" th:method="post" th:object="${UsuarioDto}" method="post">


                <div class="col-12">
                    <div class="form-floating mb-4">
                        <input type="text" id="nome" name="nome" th:field="*{nome}" class="form-control form-control-lg" />
                        <label for="nome">Nome</label>
                    </div>
                </div>
                <!-- Campo nome -->
                <div class="col-12">
                    <div class="form-floating mb-4">
                        <input type="email" id="email" name="email" th:field="*{email}" class="form-control form-control-lg" />
                        <label for="email">Email</label>
                    </div>
                </div>

                <!-- Campo sobrenome -->
                <div class="col-12">
                    <div class="form-floating mb-4">
                        <input type="password" id="senha" name="senha" th:field="*{senha}" class="form-control form-control-lg" />
                        <label for="senha">Senha</label>
                    </div>
                </div>

                <!-- Botões do formulário -->
                <div class="pt-1 mb-4">

                    <!-- Botão confirmar, serve tanto para confirmar a atualização quanto um cadastro novo-->
                    <button class="btn btn-primary mb-2 me-2" type="submit">Confirmar</button>

                    <!-- Link para fechar e retornar para a pagina de lista de usuários -->
                    <a th:href="@{/login}" class="btn btn-secondary mb-2 me-2">Fechar</a>

                </div>
            </form>

            <div th:if="${param.ins_sucesso}" class="alert alert-info" role="alert">
                <span class="mensagem">Cadastro realizado com sucesso!</span>
            </div>

            <div th:if="${param.upd_sucesso}" class="alert alert-info" role="alert">
                <span class="mensagem">Cadastro atualizado com sucesso</span>
            </div>

        </div>
    </div>
</div>


<!-- Rodapé -->
<footer class="container">
    <p>© Turma 2022-2023</p>
</footer>
<!-- Fim Rodapé -->

</body>
</html>
