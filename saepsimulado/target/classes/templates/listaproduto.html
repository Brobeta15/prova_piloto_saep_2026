<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lista de produto</title>

    <!-- Adicione os links para os arquivos CSS do Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>

<!-- Barra de navegação -->
<nav class="navbar navbar-expand-md navbar-dark .navbar.navbar-default.navbar-static-top bg-dark">
    <!-- Logo/marca principal da barra -->
    <a class="navbar-brand mb-0 h1 ms-5 me-5" href="listaproduto">Senai</a>

    <form class="d-flex ms-5 me-5" th:action="@{/logout}" th:method="Post">
        <button class="btn btn btn-outline-light my-2 my-sm-0 justify-content-end" type="submit">Logout</button>
    </form>
</nav>
<!-- Fim barra de navegação -->

<!-- Conteúdo principal -->
<div class="container mt-3">

    <!-- DataTales Example -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Lista de Produtos</h6>
        </div>
        <div class="card-body">

            <!-- Botão para redirecionar o pagina para o cadastro do usuario
                 Irá acessar a url /cadastrarusuario com o formulário em branco
            -->
            <p class="card-text" style="display:inline-block; margin-right: 30px">
                <a th:href="@{~/cadastroproduto}" class="btn btn-primary">
                    Inserir
                </a>
            </p>

            <form th:action="@{/listaproduto}"
                  method="get"
                  style="display:inline-block">

                <input type="text"
                       name="nome"
                       placeholder="Pesquisar produto">

                <button type="submit" class="btn btn-primary">
                    Pesquisar
                </button>

            </form>

            <!-- Inicio do HTML da TABELA com os dados -->
            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <!-- Inicio do HTML do título da TABELA -->
                    <thead>
                    <tr>
                        <th style="white-space: nowrap;"></th>
                        <th style="white-space: nowrap;"></th>
                        <th style="white-space: nowrap;"></th>
                        <th>Id</th>
                        <th>Produto</th>
                        <th>Estoque</th>
                    </tr>
                    </thead>

                    <!-- Inicio do HTML dos dados TABELA -->
                    <tbody>

                    <!-- Objeto que irá conter uma lista de usuários
                        Essa lista precisa ter os atributos das colunas
                    -->
                    <tr th:each="produto: ${listaproduto}">

                        <td><a th:href="@{'/alterarproduto/' + ${produto.id}}" class="btn btn-warning">Alterar</a></td>
                        <td><a th:href="@{'/listaestoque/' + ${produto.id}}" class="btn btn-primary">Estoque</a></td>
                        <td><button th:data-produto-id="${produto.id}" class="excluir btn btn-danger btn-rounded btn-fw">Excluir</button></td>
                        <!-- Atributos da tabela Dto = ( id, nome, email, telefone ) -->
                        <td th:text="${produto.id}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.estoque}"></td>

                    </tr>

                    </tbody>
                </table>

                <div>

                    <!--
                   <a th:if="${listaproduto.hasPrevious()}"
                      th:href="@{/listaproduto(pagina=${listaproduto.number - 1})}">
                       Anterior
                   </a>

                   <span th:text="${listaproduto.number + 1}"></span>

                   <a th:if="${listaproduto.hasNext()}"
                      th:href="@{/listaproduto(pagina=${listaproduto.number + 1})}">
                       Próxima
                   </a>

                    -->

               </div>
               <div th:if="${param.erro}" class="alert alert-danger" role="alert">
                   <span class="mensagem">Saída Não permitida: Estoque insuficiente!</span>
               </div>
           </div>
       </div>
   </div>
</div>
<!-- Fim conteúdo principal -->
<script src="/js/excluirproduto.js"> </script>
<!-- Rodapé -->
<footer class="container">
    <p>© Turma 2022-2023</p>
</footer>
<!-- Fim Rodapé -->

</body>
</html>
